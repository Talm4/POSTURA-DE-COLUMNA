<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía Interactiva: Salud de tu Columna</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --primario: #1e40af; /* Azul Profundo */
            --secundario: #3b82f6; /* Azul Vibrante */
            --acento: #78bb1e; /* Verde Salud */
            --fondo: #f1f5f9;
            --texto-oscuro: #0f172a;
            --texto-suave: #475569;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--fondo);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--texto-oscuro);
        }

        /* Área del Modelo 3D */
        .visor-container {
            flex: 1;
            position: relative;
            background: #fff;
            border-bottom: 4px solid var(--acento);
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }

        /* Estilo de los Puntos de Interacción */
        .Hotspot {
            background: var(--acento);
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(120, 187, 30, 0.4);
            width: 28px;
            height: 28px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .Hotspot:hover {
            transform: scale(1.3);
            background: var(--primario);
        }

        .HotspotAnnotation {
            background: var(--primario);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            position: absolute;
            transform: translate(35px, -20px);
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Panel de Estudio (Información) */
        #info-panel {
            background: white;
            padding: 30px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .panel-grid.visible { opacity: 1; }

        .info-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--acento);
        }

        .info-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--primario);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--texto-suave);
        }

        .title-main {
            font-size: 1.8rem;
            color: var(--primario);
            margin: 0;
            font-weight: 800;
        }

        .badge-incidencia {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        /* Animación de Pulso */
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(120, 187, 30, 0.6); }
            100% { box-shadow: 0 0 0 20px rgba(120, 187, 30, 0); }
        }

        /* Instrucciones Iniciales */
        #welcome-msg {
            text-align: center;
            padding: 40px;
            color: var(--texto-suave);
        }

        @media (max-width: 900px) {
            .panel-grid { grid-template-columns: 1fr; }
            #info-panel { overflow-y: auto; }
        }
    </style>
</head>
<body>

<div class="visor-container">
    <model-viewer 
        src="vertebral_column.glb" 
        camera-controls 
        auto-rotate
        touch-action="pan-y"
        shadow-intensity="1" 
        camera-orbit="45deg 75deg 110%"
        exposure="1">

        <button class="Hotspot pulse" slot="hotspot-cervical" data-position="0.0968 14.547 -38.587" onclick="showInfo('cervical')">
            <div class="HotspotAnnotation">Cuello (Cervical)</div>
        </button>

        <button class="Hotspot pulse" slot="hotspot-dorsal" data-position="0.0851 6.2719 -41.838" onclick="showInfo('dorsal')">
            <div class="HotspotAnnotation">Espalda Media (Dorsal)</div>
        </button>

        <button class="Hotspot pulse" slot="hotspot-lumbar" data-position="-0.0023 -12.261 -35.702" onclick="showInfo('lumbar')">
            <div class="HotspotAnnotation">Espalda Baja (Lumbar)</div>
        </button>

        <button class="Hotspot pulse" slot="hotspot-sacra" data-position="-0.5462 -24.700 -40.247" onclick="showInfo('sacra')">
            <div class="HotspotAnnotation">Base (Sacro)</div>
        </button>
    </model-viewer>
</div>

<div id="info-panel">
    <div id="welcome-msg">
        <h2 style="color:var(--primario)">Módulo Interactivo de Ergonomía</h2>
        <p>Selecciona un punto en la columna para iniciar tu estudio sobre posturas y salud.</p>
    </div>

    <div id="content-display" style="display:none">
        <div style="margin-bottom: 20px;">
            <h2 class="title-main" id="info-title">Zona</h2>
            <div id="info-stat" class="badge-incidencia">70% de las personas sufren de esto</div>
        </div>

        <div class="panel-grid visible">
            <div class="info-card">
                <h3>🔍 ¿Cómo se daña?</h3>
                <p id="info-risk">Explicación del daño.</p>
            </div>
            <div class="info-card" style="border-left-color: #ef4444;">
                <h3>⚡ ¿Qué sientes?</h3>
                <p id="info-symptoms">Dolores comunes.</p>
            </div>
            <div class="info-card" style="border-left-color: var(--secundario);">
                <h3>✅ Postura de Estudio</h3>
                <p id="info-tip">Consejo para mejorar.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const materialEstudio = {
        'cervical': {
            title: 'Zona del Cuello',
            stat: '7 de cada 10 personas sufren tensión aquí',
            risk: 'Mirar mucho tiempo el celular o el portátil hacia abajo. Es como si tu cuello cargara un niño de 25 kilos todo el día.',
            symptoms: 'Dolores de cabeza, cuello rígido y sensación de "hormigueo" en los dedos.',
            tip: 'Mantén tu pantalla siempre a la altura de tus ojos. ¡No bajes la cabeza, sube el equipo!'
        },
        'dorsal': {
            title: 'Espalda Media',
            stat: 'Muy común en quienes trabajan mucho tiempo sentados',
            risk: 'Sentarse "encorvado" o con los hombros hacia adelante. Esto cierra tu pecho y dificulta una buena respiración.',
            symptoms: 'Dolor punzante entre los omóplatos y cansancio muscular al final del día.',
            tip: 'Cada 30 minutos, lleva tus hombros hacia atrás y abre el pecho. ¡Imagina que quieres juntar tus omóplatos!'
        },
        'lumbar': {
            title: 'Espalda Baja',
            stat: 'Es la zona que más se lesiona en el mundo',
            risk: 'Sentarse sin apoyar la espalda baja. El peso de tu cuerpo "aplasta" los discos de tu columna en lugar de repartirse bien.',
            symptoms: 'Dolor fuerte al levantarse, sensación de "corrientazo" hacia las piernas y lumbago.',
            tip: 'Usa siempre una silla con soporte lumbar o pon una almohada pequeña en el hueco de tu espalda baja.'
        },
        'sacra': {
            title: 'Base de la Columna',
            stat: 'Afecta la comodidad en jornadas largas',
            risk: 'Sentarse en el borde de la silla o deslizarse hacia adelante. Todo el peso cae en un solo punto muy pequeño.',
            symptoms: 'Dolor molesto al sentarse en sillas duras y presión en los huesos de la cadera.',
            tip: 'Siéntate al fondo de la silla. Tus glúteos deben tocar el respaldo siempre.'
        }
    };

    function showInfo(zone) {
        const data = materialEstudio[zone];
        
        // Ocultar bienvenida, mostrar contenido
        document.getElementById('welcome-msg').style.display = 'none';
        document.getElementById('content-display').style.display = 'block';

        // Actualizar Textos
        document.getElementById('info-title').innerText = data.title;
        document.getElementById('info-stat').innerText = data.stat;
        document.getElementById('info-risk').innerText = data.risk;
        document.getElementById('info-symptoms').innerText = data.symptoms;
        document.getElementById('info-tip').innerText = data.tip;

        // Pequeño efecto de brillo al cambiar
        const panel = document.getElementById('info-panel');
        panel.style.borderTopColor = (zone === 'lumbar') ? '#ef4444' : '#78bb1e';
    }
</script>

</body>
</html>
