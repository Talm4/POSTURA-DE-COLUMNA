<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía Ergonómica - Columna</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --azul: #1e40af;
            --verde: #78bb1e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Visor 3D */
        model-viewer {
            width: 100%;
            flex: 1; /* Ocupa el espacio disponible */
            background-color: #ffffff;
            --min-hotspot-opacity: 0.5;
        }

        /* Estilo de los Puntos (Hotspots) corregido */
        .Hotspot {
            background: var(--verde);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            width: 22px;
            height: 22px;
            cursor: pointer;
            box-sizing: border-box;
            z-index: 999; /* Asegura que estén al frente */
        }

        /* Forzar visibilidad si el modelo los tapa */
        .Hotspot:not([data-visible]) {
            background: rgba(120, 187, 30, 0.3); /* Se ven semi-transparentes si están "detrás" */
            border-color: rgba(255,255,255,0.3);
        }

        .HotspotAnnotation {
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            color: var(--azul);
            font-size: 13px;
            font-weight: bold;
            padding: 5px 10px;
            position: absolute;
            transform: translate(30px, -15px);
            white-space: nowrap;
            pointer-events: none;
        }

        /* Panel de Información */
        #info-panel {
            background: #f8fafc;
            padding: 25px;
            border-top: 2px solid #e2e8f0;
            text-align: center;
            min-height: 200px;
        }

        #info-title { color: var(--azul); margin: 0 0 10px 0; }
        #info-content { color: #475569; line-height: 1.5; max-width: 600px; margin: 0 auto; }
        
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(120, 187, 30, 0.7); }
            100% { box-shadow: 0 0 0 15px rgba(120, 187, 30, 0); }
        }
    </style>
</head>
<body>

<model-viewer 
    src="vertebral_column.glb" 
    camera-controls 
    auto-rotate
    touch-action="pan-y"
    shadow-intensity="1" 
    camera-orbit="45deg 75deg 105%"
    exposure="1">

    <button class="Hotspot pulse" slot="hotspot-cervical" 
        data-position="0.0968 14.547 -38.587" 
        data-normal="0.1639 0.9195 -0.3572" 
        onclick="showInfo('cervical')">
        <div class="HotspotAnnotation">Zona Cervical</div>
    </button>

    <button class="Hotspot pulse" slot="hotspot-dorsal" 
        data-position="0.0851 6.2719 -41.838" 
        data-normal="0.2521 0.6721 -0.6961" 
        onclick="showInfo('dorsal')">
        <div class="HotspotAnnotation">Zona Dorsal</div>
    </button>

    <button class="Hotspot pulse" slot="hotspot-lumbar" 
        data-position="-0.0023 -12.261 -35.702" 
        data-normal="0.0984 0.4787 -0.8724" 
        onclick="showInfo('lumbar')">
        <div class="HotspotAnnotation">Zona Lumbar</div>
    </button>

    <button class="Hotspot pulse" slot="hotspot-sacra" 
        data-position="-0.5462 -24.700 -40.247" 
        data-normal="-0.9376 0.0769 -0.3389" 
        onclick="showInfo('sacra')">
        <div class="HotspotAnnotation">Zona Sacra</div>
    </button>

</model-viewer>

<div id="info-panel">
    <h2 id="info-title">Explora la Columna</h2>
    <div id="info-content">
        Toca los puntos verdes para conocer los riesgos ergonómicos.
    </div>
</div>

<script>
    const infoData = {
        'cervical': {
            title: 'Lordosis Cervical',
            content: '<b>Dolores:</b> Migrañas y tensión cervical.<br><b>Causa:</b> Inclinación excesiva del cuello por uso de laptops o celulares.'
        },
        'dorsal': {
            title: 'Cifosis Dorsal',
            content: '<b>Dolores:</b> Dolor de espalda media y fatiga muscular.<br><b>Causa:</b> Postura de "hombros caídos" frente al escritorio.'
        },
        'lumbar': {
            title: 'Lordosis Lumbar',
            content: '<b>Dolores:</b> Lumbago agudo.<br><b>Causa:</b> Sillas sin soporte o pasar mucho tiempo sentado sin moverse.'
        },
        'sacra': {
            title: 'Cifosis Sacra',
            content: '<b>Dolores:</b> Presión en el cóccix.<br><b>Causa:</b> Mala posición al sentarse (deslizarse hacia adelante en la silla).'
        }
    };

    function showInfo(zone) {
        const data = infoData[zone];
        document.getElementById('info-title').innerText = data.title;
        document.getElementById('info-content').innerHTML = data.content;
    }
</script>

</body>
</html>
